name: Release (self)

on:
  push:
    branches:
      - main

jobs:
  release:
    uses: ./.github/workflows/semantic-release.yml
    with:
      node-version: '20'
    secrets: inherit

  confirm-release:
    needs: release
    if: needs.release.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "A new release was created!"

